name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Tests + Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # postinstall runs `prisma generate` — ต้องการ schema เท่านั้น ไม่ต้องการ DB
          PRISMA_SKIP_POSTINSTALL_GENERATE: 'false'

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
